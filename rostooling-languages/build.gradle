task copyFatJar(type: Copy) {
    def shadowJarTask = rootProject.tasks.shadowJar
    dependsOn shadowJarTask
    from shadowJarTask.outputs
    into "server"
}

clean {
    doLast {
        delete copyFatJar.outputs
    }
}

npmInstall.dependsOn copyFatJar

task installExtension(type: Exec, dependsOn: vscodeExtension) {
    if (System.properties['os.name'].toLowerCase().contains('windows')) {
        commandLine 'code.cmd'
    } else {
        commandLine 'code'
    }
    args '--install-extension', vscodeExtension.destPath
    doLast {
        copyFatJar
    }
}

task startCode(type:Exec, dependsOn: installExtension) {
    if (System.properties['os.name'].toLowerCase().contains('windows')) {
        commandLine 'code.cmd'
    } else {
        commandLine 'code'
    }
    args "$rootProject.projectDir/demo/", '--new-window'
}

task publish(dependsOn: vscodeExtension, type: NodeTask) {
    script = file("$rootProject.projectDir/node_modules/vsce/out/vsce")
    args = [ 'publish', '-p', System.getenv('ACCESS_TOKEN'), "--packagePath", "${project.buildDir}/vscode/rostooling-languages-${project.version}.vsix"]
    execOverrides {
        workingDir = projectDir
    }
}