# Set root logger level to INFO and attach the 'stderr' appender
log4j.rootLogger=INFO, stderr

# Configure the 'stderr' appender to output to System.err
log4j.appender.stderr=org.apache.log4j.ConsoleAppender
log4j.appender.stderr.Target=System.err

# Format the log output cleanly
log4j.appender.stderr.layout=org.apache.log4j.PatternLayout
log4j.appender.stderr.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p [%t] %c{1} - %m%n